<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treino Premium + Completo (Responsivo)</title>
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden; 
            overscroll-behavior-y: none; 
            transition: background-color 0.3s, color 0.3s;
        }
        :root {
            --bg-main: #f5f5f7;
            --primary: #ff4081;
            --primary-glow: rgba(255, 64, 129, 0.15);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --success: #34c759;
            --success-glow: rgba(52, 199, 89, 0.15);
            --card-border: #e5e5ea;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --shadow: rgba(0,0,0,0.08);
            --warning: #ff9500;
            --warning-glow: rgba(255, 149, 0, 0.15);
        }
        body.dark-mode {
            --bg-main: #1c1c1e;
            --primary: #ff6b9d;
            --primary-glow: rgba(255, 107, 157, 0.25);
            --text-main: #f5f5f7;
            --text-muted: #98989e;
            --success: #34c759;
            --success-glow: rgba(52, 199, 89, 0.25);
            --card-border: #3a3a3c;
            --nav-bg: rgba(44, 44, 46, 0.9);
            --shadow: rgba(255,255,255,0.05);
        }

        /* ===== LAYOUT PRINCIPAL ===== */
        .tab-content {
            display: none;
            width: 100vw;
            height: 100dvh;
            flex-direction: row;
            overflow-x: auto; 
            overflow-y: hidden;
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            position: relative;
        }
        .tab-content::-webkit-scrollbar {
            display: none;
        }
        .tab-content.active {
            display: flex;
        }

        .exercise-card {
            scroll-snap-align: start; 
            scroll-snap-stop: always; /* ← GARANTE QUE PASSE APENAS UM POR VEZ */
            min-width: 100vw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 15px 85px 15px; /* Base ajustada para o menu inferior */
            background-color: var(--bg-main);
            position: relative;
            transition: background-color 0.4s;
            overflow: hidden; /* Evita rolar internamente e quebrar o layout */
        }
        .exercise-card.completed { background-color: rgba(52, 199, 89, 0.05); }
        .exercise-card.completed h3 { text-decoration: line-through; color: var(--text-muted); }
        .exercise-card.completed .video-container { opacity: 0.6; }

        .card-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 5px;
            flex-shrink: 0;
        }
        .counter, .progress-indicator {
            font-size: 0.8em;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .counter {
            color: var(--text-muted);
            background: rgba(0,0,0,0.05);
        }
        .progress-indicator {
            color: var(--primary);
            background: var(--primary-glow);
        }

        /* ===== VÍDEO VERTICAL MAXIMIZADO (9:16) ===== */
        .video-container {
            flex: 1; /* Ocupa todo o espaço restante disponível na tela */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0; /* Essencial para permitir que o flexbox encolha se precisar */
            margin: 5px 0;
        }
        iframe {
            height: 100%;
            max-height: 100%; /* Limita à altura do container pai */
            max-width: 100%;
            aspect-ratio: 9 / 16; /* Mantém o formato vertical cravado */
            border-radius: 16px;
            border: none;
            box-shadow: 0 6px 15px var(--shadow);
            background: #000;
            pointer-events: auto; 
        }

        .details {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 5px 0;
            flex-wrap: wrap;
            flex-shrink: 0; /* Impede que seja esmagado */
        }
        .tag {
            background: var(--nav-bg);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
        }
        .tag.highlight {
            color: var(--primary);
            background: var(--primary-glow);
            border-color: transparent;
            font-weight: 600;
        }
        .dica {
            background: var(--nav-bg);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.8em;
            color: var(--text-main);
            width: 100%;
            max-width: 500px;
            text-align: left;
            border-left: 4px solid var(--primary);
            margin: 5px 0;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            box-shadow: 0 2px 10px var(--shadow);
        }

        /* Barra de ações do exercício */
        .exercise-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
            gap: 8px;
            flex-wrap: nowrap;
            flex-shrink: 0; /* Impede que os botões desapareçam */
        }
        .check-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: var(--nav-bg);
            border: 2px dashed var(--card-border);
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            flex: 1;
            min-width: 90px;
        }
        .check-container input { display: none; }
        .check-container.active-check {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
            border-style: solid;
        }
        .carga-container {
            display: flex;
            align-items: center;
            background: var(--nav-bg);
            border-radius: 16px;
            padding: 6px;
            gap: 5px;
            border: 1px solid var(--card-border);
            flex-shrink: 0;
        }
        .carga-container input {
            width: 45px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9em;
            outline: none;
        }
        .carga-container button {
            background: var(--primary-glow);
            color: var(--primary);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timer-btn {
            background: var(--warning-glow);
            border: 1px solid var(--warning);
            color: var(--warning);
            padding: 10px 12px;
            border-radius: 16px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 80px;
        }
        .timer-active {
            background: var(--warning);
            color: white;
        }

        /* slide final */
        .slide-final { 
            justify-content: center; 
            text-align: center;
        }
        .slide-final h2 { font-size: 2em; color: var(--primary); margin-bottom: 10px; }
        .btn-finalizar {
            width: 90%;
            max-width: 300px;
            padding: 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 8px 16px var(--success-glow);
            flex-shrink: 0;
        }

        /* setas de navegação desktop */
        .nav-arrow {
            display: none; 
        }
        @media (min-width: 768px) {
            .nav-arrow {
                display: flex;
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: var(--nav-bg);
                border: 1px solid var(--card-border);
                width: 44px;
                height: 44px;
                border-radius: 50%;
                font-size: 1.2em;
                color: var(--primary);
                box-shadow: 0 4px 12px var(--shadow);
                cursor: pointer;
                z-index: 20;
                align-items: center;
                justify-content: center;
                transition: 0.2s;
            }
            .nav-arrow:active { transform: translateY(-50%) scale(0.9); }
            .nav-arrow.left { left: 15px; }
            .nav-arrow.right { right: 15px; }
        }

        /* menu inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 10px 5px;
            z-index: 100;
            box-shadow: 0 -5px 20px var(--shadow);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .nav-btn {
            background: transparent;
            border: none;
            min-width: 44px;
            height: 44px;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px var(--primary-glow);
            transform: translateY(-3px);
        }
        #resetBtn, #darkModeToggle, #wakeLockBtn {
            font-size: 1.2em;
        }

        /* Aba de estatísticas */
        #treinoE {
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
            align-items: center;
            scroll-snap-type: none; /* Estatísticas não precisam de snap */
        }
        .stats-container {
            width: 100%;
            max-width: 500px;
            background: var(--nav-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .stats-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-card {
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid var(--card-border);
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }
        .stat-label {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
        }
        .export-import {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 500px;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            font-size: 1em;
        }

        /* Modal de edição */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-main);
            padding: 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 10px;
            display: block;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            background: var(--nav-bg);
            color: var(--text-main);
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
    <div id="treinoA" class="tab-content" data-treino="A"></div>
    <div id="treinoB" class="tab-content" data-treino="B"></div>
    <div id="treinoC" class="tab-content" data-treino="C"></div>
    <div id="treinoD" class="tab-content" data-treino="D"></div>
    
    <div id="treinoE" class="tab-content" data-treino="E">
        <div class="stats-container">
            <div class="stats-title">📊 Visão Geral</div>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-value" id="totalTreinos">0</span><span class="stat-label">Treinos Totais</span></div>
                <div class="stat-card"><span class="stat-value" id="diasConsecutivos">0</span><span class="stat-label">Dias Seguidos</span></div>
                <div class="stat-card"><span class="stat-value" id="treinosSemana">0</span><span class="stat-label">Na Semana</span></div>
                <div class="stat-card"><span class="stat-value" id="ultimoTreino">-</span><span class="stat-label">Último Treino</span></div>
            </div>
        </div>
        <div class="stats-container">
            <div class="stats-title">📅 Histórico Recente</div>
            <div id="historicoList"></div>
        </div>
        <div class="export-import">
            <button class="btn" id="exportarBtn">📤 Exportar</button>
            <button class="btn" id="importarBtn">📥 Importar</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-treino="A">A</button>
        <button class="nav-btn" data-treino="B">B</button>
        <button class="nav-btn" data-treino="C">C</button>
        <button class="nav-btn" data-treino="D">D</button>
        <div style="width: 1px; height: 30px; background: var(--card-border); margin: 0 5px;"></div>
        <button class="nav-btn" data-treino="E">📊</button>
        <button class="nav-btn" id="darkModeToggle" title="Modo escuro">🌙</button>
        <button class="nav-btn" id="wakeLockBtn" title="Manter tela acesa">🔆</button>
        <button class="nav-btn" id="resetBtn" title="Resetar progresso do treino">↺</button>
    </nav>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; color: var(--primary);">Editar Exercício</h3>
            <label>Nome do Exercício</label>
            <input type="text" id="editNome">
            <label>Vídeo ID (YouTube)</label>
            <input type="text" id="editVideo" placeholder="Ex: yuIdTWl3oJ8">
            <label>Séries</label>
            <input type="text" id="editSeries">
            <label>Repetições</label>
            <input type="text" id="editReps">
            <label>Dica / Observação</label>
            <textarea id="editDica" rows="3"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" id="saveEdit">Salvar</button>
                <button class="btn" style="background: var(--card-border); color: var(--text-main);" id="cancelEdit">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== BASE DE DADOS DOS TREINOS ====================
            let treinos = {
                A: {
                    nome: "Inferiores A",
                    exercicios: [
                        { nome: "Leg Press 45°", video: "yuIdTWl3oJ8", series: 4, reps: 12, dica: "Mantenha os joelhos alinhados. Não estique totalmente no final." },
                        { nome: "Mesa Flexora", video: "BmOYMWzmmWM", series: 4, reps: "12 a 15", dica: "Apoie bem o quadril. Movimento só da perna, sem tranco." },
                        { nome: "Elevação Pélvica", video: "ysWdBc1a1FA", series: 4, reps: 12, dica: "Olhe para frente. Segure 2s em cima esmagando o glúteo." },
                        { nome: "Afundo no Lugar", video: "poAnWrA7DSU", series: 3, reps: "12 / perna", dica: "Tronco inclinado à frente. Força no calcanhar da perna da frente." },
                        { nome: "Cadeira Abdutora", video: "nabhYLtz8Gg", series: 3, reps: 15, dica: "Abra com explosão, feche controlando o peso." },
                        { nome: "Panturrilha em Pé", video: "9fIw0ue8iQE", series: 3, reps: 15, dica: "" },
                        { nome: "Cardio Final", video: "VBMqOiiIZAA", series: "10 Min", reps: "", dica: "Esteira Inclinada/Escada" }
                    ]
                },
                B: {
                    nome: "Superiores B",
                    exercicios: [
                        { nome: "Puxada na Frente", video: "GjxRBJIOkJk", series: 3, reps: 12, dica: "Estufe o peito, feche as escápulas e puxe a barra." },
                        { nome: "Remada Baixa", video: "10bYGIcOtFs", series: 3, reps: 12, dica: "Costas retas. Traga os cotovelos raspando nas costelas." },
                        { nome: "Supino na Máquina", video: "rZ5LTpp79Us", series: 3, reps: 12, dica: "" },
                        { nome: "Elevação Lateral", video: "7q282CL_DSU", series: 3, reps: 15, dica: "Cotovelos levemente flexionados, até a altura dos ombros." },
                        { nome: "Rosca Direta", video: "vDWPtEMrzeU", series: 3, reps: 12, dica: "" },
                        { nome: "Tríceps Corda", video: "4NWWB0f0vzQ", series: 3, reps: 12, dica: "Abra a corda no final do movimento para contrair bem." },
                        { nome: "Série de Abdômen", video: "", series: "Prancha + Infra + Oblíquo", reps: "", dica: "" },
                        { nome: "Cardio Final", video: "", series: "15 min", reps: "", dica: "Esteira inclinada" }
                    ]
                },
                C: {
                    nome: "Inferiores C",
                    exercicios: [
                        { nome: "agachamento hack maquina", video: "yGTQPVdr-UQ", series: 4, reps: 12, dica: "Pés levemente à frente. Agache até as coxas ficarem paralelas." },
                        { nome: "Cadeira Extensora", video: "BmOYMWzmmWM", series: 3, reps: "15 (Drop)", dica: "Na última série, faça drop-set até a falha." },
                        { nome: "Passada Andando/Lugar", video: "poAnWrA7DSU", series: 3, reps: "12 / perna", dica: "" },
                        { nome: "Glúteo na Polia", video: "shrmH9DwkQI", series: 3, reps: 15, dica: "" },
                        { nome: "Cadeira Abdutora", video: "nabhYLtz8Gg", series: 3, reps: 15, dica: "" },
                        { nome: "Panturrilha Sentada", video: "9fIw0ue8iQE", series: 3, reps: 15, dica: "" },
                        { nome: "Cardio Final", video: "", series: "10 Min", reps: "", dica: "Bike Moderado" }
                    ]
                },
                D: {
                    nome: "Metabólico D",
                    exercicios: [
                        { nome: "Circuito Alta Queima", video: "", series: "3 a 4 Voltas", reps: "1 min desc.", dica: "• 15 Agachamentos\n• 12 Flexões\n• 20 Polichinelos\n• 15 Stiff\n• 20 Abdominais\n• 30s Prancha" },
                        { nome: "Cardio Final", video: "", series: "15 Min", reps: "", dica: "Cardio Moderado" }
                    ]
                }
            };

            // ==================== DADOS ADICIONAIS ====================
            let cargas = {}; 
            let historico = []; 
            let wakeLock = null;
            let timers = {}; 

            // ==================== FUNÇÕES DE RENDERIZAÇÃO ====================
            function construirExercicio(ex, index, total, treinoId) {
                const card = document.createElement('div');
                card.className = 'exercise-card';
                card.dataset.index = index;
                card.dataset.treino = treinoId;

                const header = document.createElement('div');
                header.className = 'card-header';
                header.innerHTML = `<span class="counter">${index+1} de ${total}</span>
                                    <span class="progress-indicator" id="progress-${treinoId}-${index}">0/${total}</span>`;
                card.appendChild(header);

                const titleDiv = document.createElement('div');
                titleDiv.style.display = 'flex';
                titleDiv.style.alignItems = 'center';
                titleDiv.style.justifyContent = 'space-between';
                titleDiv.style.width = '100%';
                titleDiv.style.maxWidth = '500px';
                
                const h3 = document.createElement('h3');
                h3.textContent = ex.nome;
                titleDiv.appendChild(h3);
                
                const editBtn = document.createElement('button');
                editBtn.innerHTML = '✏️';
                editBtn.style.background = 'transparent';
                editBtn.style.border = 'none';
                editBtn.style.fontSize = '1.2em';
                editBtn.style.cursor = 'pointer';
                editBtn.onclick = () => abrirModalEdicao(treinoId, index);
                titleDiv.appendChild(editBtn);
                card.appendChild(titleDiv);

                // Container do Vídeo Maximizado (Flexível)
                const videoContainer = document.createElement('div');
                videoContainer.className = 'video-container';
                const iframe = document.createElement('iframe');
                if (ex.video) {
                    iframe.src = `https://www.youtube.com/embed/${ex.video}?mute=1&enablejsapi=1&version=3&rel=0`;
                }
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowFullscreen = true;
                iframe.loading = 'lazy';
                videoContainer.appendChild(iframe);
                card.appendChild(videoContainer);

                const details = document.createElement('div');
                details.className = 'details';
                if (ex.series) details.innerHTML += `<span class="tag">${ex.series} Séries</span>`;
                if (ex.reps) details.innerHTML += `<span class="tag highlight">${ex.reps} Reps</span>`;
                card.appendChild(details);

                if (ex.dica) {
                    const dica = document.createElement('div');
                    dica.className = 'dica';
                    dica.innerHTML = `💡 ${ex.dica.replace(/\n/g, '<br>')}`;
                    card.appendChild(dica);
                }

                const actions = document.createElement('div');
                actions.className = 'exercise-actions';

                const label = document.createElement('label');
                label.className = 'check-container';
                label.innerHTML = `<input type="checkbox" data-treino="${treinoId}" data-exercicio="${index}">
                                  <span class="icon" style="margin-right: 5px;">⭕</span>
                                  <span class="text">Feito</span>`;
                actions.appendChild(label);

                const cargaDiv = document.createElement('div');
                cargaDiv.className = 'carga-container';
                const menosBtn = document.createElement('button');
                menosBtn.textContent = '−';
                const cargaInput = document.createElement('input');
                cargaInput.type = 'number';
                cargaInput.min = '0';
                cargaInput.step = '0.5';
                cargaInput.value = cargas[`${treinoId}-${index}`] || '';
                cargaInput.placeholder = 'kg';
                const maisBtn = document.createElement('button');
                maisBtn.textContent = '+';
                
                menosBtn.onclick = () => { cargaInput.value = (parseFloat(cargaInput.value)||0) - 1; cargaInput.dispatchEvent(new Event('input')); };
                maisBtn.onclick = () => { cargaInput.value = (parseFloat(cargaInput.value)||0) + 1; cargaInput.dispatchEvent(new Event('input')); };
                cargaInput.addEventListener('input', function() {
                    cargas[`${treinoId}-${index}`] = this.value;
                    salvarEstado();
                });

                cargaDiv.appendChild(menosBtn);
                cargaDiv.appendChild(cargaInput);
                cargaDiv.appendChild(maisBtn);
                actions.appendChild(cargaDiv);

                const timerBtn = document.createElement('button');
                timerBtn.className = 'timer-btn';
                timerBtn.textContent = '⏱️ 60s';
                timerBtn.onclick = () => iniciarTimer(timerBtn, treinoId, index);
                actions.appendChild(timerBtn);

                card.appendChild(actions);

                // Setas para visualização em computadores
                if (index > 0) {
                    const leftArrow = document.createElement('button');
                    leftArrow.className = 'nav-arrow left';
                    leftArrow.innerHTML = '❮';
                    leftArrow.onclick = () => moverSlide(treinoId, -1);
                    card.appendChild(leftArrow);
                }
                if (index < total - 1) {
                    const rightArrow = document.createElement('button');
                    rightArrow.className = 'nav-arrow right';
                    rightArrow.innerHTML = '❯';
                    rightArrow.onclick = () => moverSlide(treinoId, 1);
                    card.appendChild(rightArrow);
                }

                return card;
            }

            function construirFinal(treinoId, total) {
                const card = document.createElement('div');
                card.className = 'exercise-card slide-final';
                card.dataset.index = total;
                card.dataset.treino = treinoId;

                if (total > 0) {
                    const leftArrow = document.createElement('button');
                    leftArrow.className = 'nav-arrow left';
                    leftArrow.innerHTML = '❮';
                    leftArrow.onclick = () => moverSlide(treinoId, -1);
                    card.appendChild(leftArrow);
                }

                card.innerHTML += `
                    <h2>Tudo Pronto!</h2>
                    <p style="color: var(--text-muted); font-size: 1em; max-width: 250px;">Você concluiu o Treino ${treinoId}.</p>
                    <button class="btn-finalizar" onclick="finalizarTreino('Treino ${treinoId}')">Finalizar Treino 🏆</button>
                `;
                return card;
            }

            function renderizarTodosTreinos() {
                for (let [id, treino] of Object.entries(treinos)) {
                    const container = document.getElementById(`treino${id}`);
                    container.innerHTML = '';
                    const total = treino.exercicios.length;
                    treino.exercicios.forEach((ex, i) => {
                        container.appendChild(construirExercicio(ex, i, total, id));
                    });
                    container.appendChild(construirFinal(id, total));
                }
                atualizarTodosContadores();
            }

            // ==================== NAVEGAÇÃO ====================
            window.moverSlide = function(treinoId, direcao) {
                const container = document.getElementById(`treino${treinoId}`);
                const cardWidth = container.clientWidth;
                const currentScroll = container.scrollLeft;
                
                // Calcula com precisão para qual index pular, evitando pulos duplos
                let currentIndex = Math.round(currentScroll / cardWidth);
                const nextIndex = currentIndex + direcao;
                
                container.scrollTo({ left: nextIndex * cardWidth, behavior: 'smooth' });
            };

            // ==================== ESTADO E SALVAMENTO ====================
            const STORAGE_KEY = 'treinoAppCompleto';

            function salvarEstado() {
                const estado = {
                    treinos: treinos,
                    cargas: cargas,
                    historico: historico,
                    treinoAtivo: document.querySelector('.tab-content.active')?.id.replace('treino', '') || 'A',
                    concluido: {}
                };
                for (let id of ['A','B','C','D']) {
                    estado.concluido[id] = [];
                    const container = document.getElementById(`treino${id}`);
                    if (!container) continue;
                    container.querySelectorAll('.exercise-card:not(.slide-final) input[type="checkbox"]').forEach((cb, idx) => {
                        if (cb.checked) estado.concluido[id].push(idx);
                    });
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
                atualizarTodosContadores();
                atualizarEstatisticas();
            }

            function carregarEstado() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return;
                try {
                    const estado = JSON.parse(saved);
                    if (estado.treinos) treinos = estado.treinos;
                    if (estado.cargas) cargas = estado.cargas;
                    if (estado.historico) historico = estado.historico;

                    renderizarTodosTreinos();

                    if (estado.treinoAtivo) {
                        const botoes = document.querySelectorAll('.nav-btn[data-treino]');
                        botoes.forEach(btn => {
                            if (btn.dataset.treino === estado.treinoAtivo) {
                                mudarTreino(estado.treinoAtivo, btn);
                            }
                        });
                    }

                    for (let [id, indices] of Object.entries(estado.concluido || {})) {
                        const container = document.getElementById(`treino${id}`);
                        if (!container) continue;
                        container.querySelectorAll('.exercise-card:not(.slide-final) input[type="checkbox"]').forEach((cb, idx) => {
                            if (indices.includes(idx)) {
                                cb.checked = true;
                                atualizarCheckboxUI(cb);
                            }
                        });
                    }
                } catch (e) {}
            }

            function atualizarCheckboxUI(checkbox) {
                const label = checkbox.closest('.check-container');
                const card = checkbox.closest('.exercise-card');
                if (!label || !card) return;
                if (checkbox.checked) {
                    card.classList.add('completed');
                    label.classList.add('active-check');
                    label.querySelector('.icon').innerHTML = '✅';
                    label.querySelector('.text').innerText = 'Feito!';
                    vibrar(50);
                } else {
                    card.classList.remove('completed');
                    label.classList.remove('active-check');
                    label.querySelector('.icon').innerHTML = '⭕';
                    label.querySelector('.text').innerText = 'Feito';
                }
            }

            function atualizarTodosContadores() {
                for (let id of ['A','B','C','D']) {
                    const container = document.getElementById(`treino${id}`);
                    if (!container) continue;
                    const total = container.querySelectorAll('.exercise-card:not(.slide-final)').length;
                    const feitos = container.querySelectorAll('.exercise-card:not(.slide-final) input[type="checkbox"]:checked').length;
                    
                    container.querySelectorAll('.progress-indicator').forEach(ind => {
                        ind.innerText = `${feitos}/${total}`;
                    });
                }
            }

            // ==================== HISTÓRICO ====================
            function registrarTreinoFinalizado(treinoId) {
                const hoje = new Date().toISOString().split('T')[0];
                historico.push({ data: hoje, treino: treinoId, nome: treinos[treinoId].nome });
                salvarEstado();
                atualizarEstatisticas();
            }

            function atualizarEstatisticas() {
                document.getElementById('totalTreinos').innerText = historico.length;
                let streak = 0;
                const datas = [...new Set(historico.map(h => h.data))].sort().reverse();
                let hoje = new Date().toISOString().split('T')[0];
                for (let i = 0; i < datas.length; i++) {
                    if (datas[i] === hoje) {
                        streak++;
                        hoje = new Date(new Date(hoje).setDate(new Date(hoje).getDate() - 1)).toISOString().split('T')[0];
                    } else break;
                }
                document.getElementById('diasConsecutivos').innerText = streak;

                const inicioSemana = new Date();
                inicioSemana.setDate(inicioSemana.getDate() - inicioSemana.getDay() + 1);
                const fimSemana = new Date(inicioSemana);
                fimSemana.setDate(fimSemana.getDate() + 6);
                const semana = historico.filter(h => {
                    const d = new Date(h.data);
                    return d >= inicioSemana && d <= fimSemana;
                }).length;
                document.getElementById('treinosSemana').innerText = semana;

                if (historico.length > 0) {
                    document.getElementById('ultimoTreino').innerText = historico[historico.length-1].treino;
                } else {
                    document.getElementById('ultimoTreino').innerText = '-';
                }

                const lista = document.getElementById('historicoList');
                lista.innerHTML = historico.slice(-10).reverse().map(h => 
                    `<div style="padding: 10px; border-bottom: 1px solid var(--card-border); color: var(--text-main); font-size: 0.9em;">${h.data.split('-').reverse().join('/')} - Treino ${h.treino}</div>`
                ).join('');
            }

            // ==================== UTILITÁRIOS ====================
            function iniciarTimer(botao, treinoId, exercicioIndex) {
                if (timers[`${treinoId}-${exercicioIndex}`]) {
                    clearTimeout(timers[`${treinoId}-${exercicioIndex}`].timeout);
                    delete timers[`${treinoId}-${exercicioIndex}`];
                    botao.classList.remove('timer-active');
                    botao.textContent = '⏱️ 60s';
                    return;
                }
                botao.classList.add('timer-active');
                let segundos = 60;
                botao.textContent = `⏱️ ${segundos}s`;
                const intervalo = setInterval(() => {
                    segundos--;
                    botao.textContent = `⏱️ ${segundos}s`;
                    if (segundos <= 0) {
                        clearInterval(intervalo);
                        botao.classList.remove('timer-active');
                        botao.textContent = '⏱️ 60s';
                        vibrar(200);
                        delete timers[`${treinoId}-${exercicioIndex}`];
                    }
                }, 1000);
                timers[`${treinoId}-${exercicioIndex}`] = { timeout: intervalo };
            }

            function vibrar(ms) {
                if ('vibrate' in navigator) navigator.vibrate(ms);
            }

            async function toggleWakeLock() {
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                    document.getElementById('wakeLockBtn').style.color = '';
                } else {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                        document.getElementById('wakeLockBtn').style.color = 'var(--warning)';
                    } catch (err) {
                        alert('Recurso não suportado no navegador.');
                    }
                }
            }

            // ==================== INTERAÇÕES DE SISTEMA ====================
            window.finalizarTreino = function(nomeTreino) {
                const treinoId = nomeTreino.replace('Treino ', '');
                registrarTreinoFinalizado(treinoId);
                alert(`🎉 PARABÉNS! 🎉\n\nVocê finalizou o ${nomeTreino}!`);
            };

            function mudarTreino(treinoId, botao) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.getElementById(`treino${treinoId}`).classList.add('active');
                document.querySelectorAll('.nav-btn[data-treino]').forEach(btn => btn.classList.remove('active'));
                if (botao) botao.classList.add('active');
                salvarEstado();
            }

            let editandoTreino = null, editandoIndex = null;
            function abrirModalEdicao(treinoId, index) {
                editandoTreino = treinoId;
                editandoIndex = index;
                const ex = treinos[treinoId].exercicios[index];
                document.getElementById('editNome').value = ex.nome || '';
                document.getElementById('editVideo').value = ex.video || '';
                document.getElementById('editSeries').value = ex.series || '';
                document.getElementById('editReps').value = ex.reps || '';
                document.getElementById('editDica').value = ex.dica || '';
                document.getElementById('editModal').classList.add('active');
            }

            document.getElementById('saveEdit').addEventListener('click', () => {
                if (editandoTreino && editandoIndex !== null) {
                    treinos[editandoTreino].exercicios[editandoIndex] = {
                        nome: document.getElementById('editNome').value,
                        video: document.getElementById('editVideo').value,
                        series: document.getElementById('editSeries').value,
                        reps: document.getElementById('editReps').value,
                        dica: document.getElementById('editDica').value
                    };
                    renderizarTodosTreinos();
                    salvarEstado();
                    document.getElementById('editModal').classList.remove('active');
                }
            });

            document.getElementById('cancelEdit').addEventListener('click', () => {
                document.getElementById('editModal').classList.remove('active');
            });

            // ==================== EVENT LISTNERS ====================
            renderizarTodosTreinos();
            carregarEstado();
            atualizarEstatisticas();

            document.addEventListener('change', function(e) {
                if (e.target.matches('.check-container input[type="checkbox"]')) {
                    atualizarCheckboxUI(e.target);
                    salvarEstado();
                }
            });

            document.querySelectorAll('.nav-btn[data-treino]').forEach(btn => {
                btn.addEventListener('click', function() {
                    mudarTreino(this.dataset.treino, this);
                });
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                const treinoAtivo = document.querySelector('.tab-content.active')?.id.replace('treino', '');
                if (!treinoAtivo || treinoAtivo === 'E') return;
                if (confirm(`Resetar todo o progresso do Treino ${treinoAtivo}?`)) {
                    const container = document.getElementById(`treino${treinoAtivo}`);
                    container.querySelectorAll('.exercise-card:not(.slide-final) input[type="checkbox"]').forEach(cb => {
                        cb.checked = false;
                        atualizarCheckboxUI(cb);
                    });
                    salvarEstado();
                }
            });

            document.getElementById('darkModeToggle').addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                this.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            });

            document.getElementById('wakeLockBtn').addEventListener('click', toggleWakeLock);

        })();
    </script>
</body>
</html>
