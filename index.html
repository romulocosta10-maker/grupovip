<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos VIP Shopee - Entre no Grupo</title>
    <meta name="description" content="Entre no grupo VIP de achadinhos da Shopee e receba descontos exclusivos, promoções relâmpago e preços imperdíveis.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ee4d2d;
            --primary-hover: #d03416;
            --text-dark: #1f1f1f;
            --text-gray: #666;
            --white: #fff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-soft: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --gradient-bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --whatsapp-green: #25d366;
            --whatsapp-hover: #20ba5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            background: var(--gradient-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            color: var(--text-dark);
        }

        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
        }

        .shape-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: #ffeee8;
        }

        .shape-2 {
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: #e8f0ff;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: var(--shadow-soft);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .logo {
            max-width: 120px;
            height: auto;
            border-radius: 12px;
        }

        .badge {
            background: #fff1f0;
            color: var(--primary-color);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: inline-block;
            border: 1px solid #ffd8d4;
        }

        .headline {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.25;
            color: var(--text-dark);
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }

        .subheadline {
            font-size: 1.05rem;
            color: var(--text-gray);
            line-height: 1.7;
            margin-top: 24px;
            margin-bottom: 12px;
            width: 100%;
        }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--whatsapp-green);
            color: var(--white);
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        .cta-button:hover {
            background: var(--whatsapp-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .security-note {
            font-size: 0.8rem;
            color: #999;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-top: 16px;
            margin-bottom: 32px;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: #f8f8f8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.25rem;
            transition: transform 0.3s ease;
        }

        .feature-item:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
            background: #fff1f0;
        }

        .feature-item span {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-gray);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            padding-bottom: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 16px; }
            .glass-card { padding: 32px 24px; border-radius: 24px; gap: 24px; }
            .headline { font-size: 1.75rem; }
            .subheadline { font-size: 1rem; margin-bottom: 24px; }
            .features { gap: 12px; }
            .feature-item span { font-size: 0.7rem; }
        }
    </style>
</head>
